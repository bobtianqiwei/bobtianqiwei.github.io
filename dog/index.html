    <div class="code-embed w-embed w-script">
      <div id="lucky-dog" style="font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Helvetica, Arial, sans-serif; max-width:400px; margin:0 auto; padding:16px; display:grid; gap:10px; place-items:center; text-align:center;">
        <h2 style="margin:0;font-size:20px;">Today’s Lucky Dog</h2>
        <div id="ld-img-wrap" style="width:100%; aspect-ratio:1/1; background:#eee; overflow:hidden; display:grid; place-items:center;">
          <span id="ld-loading" style="font-size:12px; color:#666;">Loading…</span>
        </div>
        <div id="ld-caption" style="font-size:14px; color:#333;"></div>
      </div>
      <script>
(function () {
  const API = "https://dog.ceo/api/breeds/image/random";
  const imgWrap = document.getElementById("ld-img-wrap");
  const loading = document.getElementById("ld-loading");
  const caption = document.getElementById("ld-caption");
  function titleCase(s) {
    return s.split(" ").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
  }
  function breedFromUrl(url) {
    try {
      const p = new URL(url).pathname.split("/").filter(Boolean);
      const i = p.indexOf("breeds");
      if (i >= 0 && p[i+1]) {
        return titleCase(p[i+1].replace(/[-_]/g, " "));
      }
    } catch (e) {}
    return "Mystery Pup";
  }
  function render(url) {
    const img = new Image();
    img.alt = "Lucky Dog";
    img.style.width = "100%";
    img.style.height = "100%";
    img.style.objectFit = "cover";
    img.onload = () => {
      if (loading) loading.remove();
      imgWrap.appendChild(img);
      caption.textContent = breedFromUrl(url);
    };
    img.onerror = () => {
      if (loading) loading.remove();
      caption.textContent = "Couldn’t fetch a dog right now. Please refresh.";
    };
    img.src = url;
  }
  fetch(API, { cache: "no-store" })
    .then(r => r.json())
    .then(j => {
      if (j.status === "success" && j.message) render(j.message);
      else throw new Error("Dog API error");
    })
    .catch(() => {
      if (loading) loading.remove();
      caption.textContent = "Couldn’t fetch a dog right now. Please refresh.";
    });
})();
</script>
