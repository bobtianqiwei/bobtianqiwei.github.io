<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Test page for Bob Tianqi Wei">
  <title>Test / Bob Tianqi Wei</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap");

    :root {
      color-scheme: dark;
      --bg: #0a0d10;
      --text: #d8dee9;
      --muted: #7f8a96;
      --accent: #f5f7fa;
      --max-width: 680px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-size: 17px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Mono", monospace;
      line-height: 1.7;
      padding: 48px 24px;
    }

    main {
      width: min(100%, var(--max-width));
      margin: 0 auto;
    }

    h1,
    p {
      margin: 0;
      font-size: 1rem;
      font-weight: 400;
    }

    h1 {
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    p + p {
      margin-top: 0.7rem;
    }

    .label {
      color: var(--muted);
    }

    a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid rgba(216, 222, 233, 0.35);
    }

    a:hover {
      color: var(--accent);
      border-bottom-color: rgba(245, 247, 250, 0.7);
    }

    @media (max-width: 640px) {
      html {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Test</h1>
    <p><span class="label">page</span> This is a test page.</p>
    <p><span class="label">home</span> <a href="../">/</a></p>
  </main>
</body>
</html>
