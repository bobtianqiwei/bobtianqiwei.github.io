<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Terminal page for Bob Tianqi Wei">
  <title>Test / Bob Tianqi Wei</title>
  <link rel="stylesheet" href="/test/test.css">
</head>
<body>
  <main>
    <section class="terminal" aria-label="Terminal interface">
      <div class="terminal-header">
        <p>bob@site:~/test</p>
        <p>Interactive terminal prototype</p>
      </div>
      <div class="history" data-history></div>
      <form class="input-row" data-form autocomplete="off">
        <label for="command-input">bob@site:~$</label>
        <input
          id="command-input"
          name="command"
          type="text"
          data-input
          spellcheck="false"
          autocapitalize="off"
          autocomplete="off"
          aria-label="Terminal command input"
        >
      </form>
    </section>
  </main>
  <script src="/test/terminal.js"></script>
</body>
</html>
