    <div class="code-embed w-embed w-script">
      <div id="lucky-cat" style="font-family: system-ui,-apple-system,Segoe UI,Roboto,Inter,Helvetica,Arial,sans-serif; max-width:360px; margin:0 auto; padding:16px; display:grid; gap:10px; place-items:center; text-align:center;">
        <h2 style="margin:0; font-size:20px;">Today’s Lucky Cat</h2>
        <div id="lc-img-wrap" style="width:100%; aspect-ratio:1/1; background:#eee; overflow:hidden; display:grid; place-items:center;">
          <span style="font-size:12px; color:#666;">Loading…</span>
        </div>
        <div id="lc-caption" style="font-size:14px; color:#333;"></div>
      </div>
      <script>
(function(){
  const API = "https://api.thecatapi.com/v1/images/search";
  const wrap = document.getElementById("lc-img-wrap");
  const caption = document.getElementById("lc-caption");
  function render(url){
    wrap.innerHTML = "";
    const img = new Image();
    img.alt = "Lucky Cat";
    img.style.width = "100%";
    img.style.height = "100%";
    img.style.objectFit = "cover";
    img.onload = () => {
      caption.textContent = "Have a purr-fect day!";
      wrap.appendChild(img);
    };
    img.onerror = () => {
      caption.textContent = "Couldn’t fetch a cat.😭 Please try again.";
    };
    img.src = url;
  }
  function fetchCat(){
    wrap.innerHTML = '<span style="font-size:12px;color:#666;">Loading…</span>';
    fetch(API + "?cb=" + Date.now(), { cache: "no-store" })
      .then(r => r.json())
      .then(arr => {
        if (arr && arr[0] && arr[0].url) render(arr[0].url);
        else throw new Error();
      })
      .catch(() => {
        caption.textContent = "Couldn’t fetch a cat.😭 Please try again.";
      });
  }
  // 页面加载自动获取一次
  fetchCat();
})();
</script>
