        <h2 style="margin:0; font-size:20px;">Which Pokémon are you today?</h2>
        <div id="pkm-img-wrap" style="width:100%; aspect-ratio:1/1; background:#fff; overflow:hidden; display:grid; place-items:center;">
          <span id="pkm-loading" style="font-size:12px; color:#666;">Loading…</span>
        </div>
        <div id="pkm-name" style="font-size:16px; color:#111;"></div>
        <!--  按钮已删除  -->
      </div>
      <script>
(function(){
  const MIN_ID = 1, MAX_ID = 898; // safe range for official artwork
  const wrap = document.getElementById("pkm-img-wrap");
  const nameEl = document.getElementById("pkm-name");
  function titleCase(s){ 
    return s.replace(/[-_]/g," ").replace(/\b\w/g, c => c.toUpperCase()); 
  }
  function randomId(){ 
    return Math.floor(Math.random() * (MAX_ID - MIN_ID + 1)) + MIN_ID; 
  }
  function render(name, imgUrl){
    wrap.innerHTML = "";
    const img = new Image();
    img.alt = name;
    img.style.width = "100%";
    img.style.height = "100%";
    img.style.objectFit = "contain";
    img.onload = () => { 
      nameEl.textContent = titleCase(name); 
      wrap.appendChild(img); 
    };
    img.onerror = () => { 
      nameEl.textContent = "Couldn’t fetch Pokémon. Please try again."; 
    };
    img.src = imgUrl;
  }
  function fetchPokemon(){
    wrap.innerHTML = '<span style="font-size:12px;color:#666;">Loading…</span>';
    nameEl.textContent = "";
    const id = randomId();
    fetch("https://pokeapi.co/api/v2/pokemon/" + id + "?cb=" + Date.now(), { cache: "no-store" })
      .then(r => r.json())
      .then(j => {
        const name = j.name || ("pokemon #" + id);
        const art = j.sprites?.other?.["official-artwork"]?.front_default || j.sprites?.front_default;
        if (!art) throw new Error("no image");
        render(name, art);
      })
      .catch(() => { 
        nameEl.textContent = "Couldn’t fetch Pokémon. Please try again."; 
      });
  }
  // 页面加载自动获取一次
  fetchPokemon();
})();
</script>
