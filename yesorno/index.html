      <div id="yesno" style="font-family: system-ui,-apple-system,Segoe UI,Roboto,Inter,Helvetica,Arial,sans-serif; max-width:360px; margin:0 auto; padding:16px; display:grid; gap:10px; place-items:center; text-align:center;">
        <h2 style="margin:0; font-size:20px;">Yes or No</h2>
        <div id="yn-img-wrap" style="width:100%; aspect-ratio:1/1; background:#eee; overflow:hidden; display:grid; place-items:center;">
          <span id="yn-loading" style="font-size:12px; color:#666;">Loading…</span>
        </div>
        <div id="yn-caption" style="font-size:14px; color:#333;"></div>
        <button id="yn-btn" type="button" style="font-size:14px; padding:8px 12px; border:1px solid #111; background:#fff; cursor:pointer;">
          Ask again
        </button>
      </div>
      <script>
(function () {
  const API = "https://yesno.wtf/api";
  const wrap = document.getElementById("yn-img-wrap");
  const loading = document.getElementById("yn-loading");
  const caption = document.getElementById("yn-caption");
  const btn = document.getElementById("yn-btn");
  function render(answer, imageUrl) {
    wrap.innerHTML = "";
    const img = new Image();
    img.alt = "Answer: " + answer.toUpperCase();
    img.style.width = "100%";
    img.style.height = "100%";
    img.style.objectFit = "cover";
    img.onload = () => {
      caption.textContent = "Answer: " + answer.toUpperCase();
      wrap.appendChild(img);
    };
    img.onerror = () => {
      caption.textContent = "Couldn’t fetch an answer. Please try again.";
    };
    img.src = imageUrl;
  }
  function fetchAnswer() {
    wrap.innerHTML = "";
    const skel = document.createElement("span");
    skel.textContent = "Loading…";
    skel.style.fontSize = "12px";
    skel.style.color = "#666";
    wrap.appendChild(skel);
    fetch(API, { cache: "no-store" })
      .then(r => r.json())
      .then(j => {
        if (j && j.answer && j.image) render(j.answer, j.image);
        else throw new Error("API error");
      })
      .catch(() => {
        caption.textContent = "Couldn’t fetch an answer. Please try again.";
      });
  }
  // Init + interactions
  fetchAnswer();
  btn.addEventListener("click", fetchAnswer);
  // Optional: press Enter to ask again
  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") fetchAnswer();
  });
})();
</script>

          <script>
(function(){
  const API1 = "https://official-joke-api.appspot.com/jokes/random";
  const API2 = "https://v2.jokeapi.dev/joke/Any?type=twopart"; // fallback
  const setupEl = document.getElementById("joke-setup");
  const punchEl = document.getElementById("joke-punch");
  function render(setup, punch){ 
    setupEl.textContent = setup; 
    punchEl.textContent = punch; 
  }
  function fetchJoke(){
    setupEl.textContent = "Loading…"; 
    punchEl.textContent = "";
    fetch(API1 + "?cb=" + Date.now(), { cache: "no-store" })
      .then(r => r.json())
      .then(j => { 
        if (j && j.setup && j.punchline) render(j.setup, j.punchline); 
        else throw new Error(); 
      })
      .catch(() => {
        fetch(API2 + "&cb=" + Date.now(), { cache: "no-store" })
          .then(r => r.json())
          .then(j => { 
            if (j && j.setup && j.delivery) render(j.setup, j.delivery); 
            else throw new Error(); 
          })
          .catch(() => { 
            render("Couldn’t fetch a joke.", "Please try again."); 
          });
      });
  }
  // 页面加载时自动获取一个笑话
  fetchJoke();
})();
</script>
